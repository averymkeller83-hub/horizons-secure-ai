version: "3.9"

services:
  lead-gen-api:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  lead-gen-worker:
    build: .
    command: celery -A src.outreach.tasks worker --loglevel=info
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  lead-gen-beat:
    build: .
    command: celery -A src.outreach.tasks beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: horizons
      POSTGRES_PASSWORD: horizons
      POSTGRES_DB: horizons_leads
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    restart: unless-stopped

volumes:
  pgdata:
